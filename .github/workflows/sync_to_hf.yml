name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Go into the Backend directory
          cd Backend
          
          # Initialize a temporary git repo here
          git init
          git config user.email "bot@dietdesk.ai"
          git config user.name "DietDesk Bot"
          
          # Add all files in Backend folder
          git add .
          git commit -m "Auto-sync from GitHub"
          
          # Force push to the root of the Hugging Face space
          git push --force https://arrifection:$HF_TOKEN@huggingface.co/spaces/arrifection/nutrition-backend main
