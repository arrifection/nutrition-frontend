name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is not set in GitHub Secrets."
            exit 1
          fi
          cd Backend
          git init -b main
          git config user.email "bot@dietdesk.ai"
          git config user.name "DietDesk Bot"
          git add .
          git commit -m "Auto-sync from GitHub"
          git push --force https://arrifection:$HF_TOKEN@huggingface.co/spaces/arrifection/nutrition-backend main

