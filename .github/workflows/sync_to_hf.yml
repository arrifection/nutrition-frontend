name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd Backend
          git init -b main
          git config user.email "bot@dietdesk.ai"
          git config user.name "DietDesk Bot"
          git add .
          git commit -m "Auto-sync from GitHub"
          # Using 'token' as the username is the most reliable way for HF sync
          git push --force https://token:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/arrifection/nutrition-backend main
